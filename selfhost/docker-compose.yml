# Run from the selfhost/ directory:  docker compose up -d --build
services:
  app:
    build:
      context: ..
      dockerfile: selfhost/Dockerfile
    restart: unless-stopped
    env_file: [ .env ]          # copy .env.example -> .env first
    expose: [ "3000" ]
  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on: [ app ]
    ports: [ "80:80", "443:443" ]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
volumes:
  caddy_data:
  caddy_config:
