name: Android

on:
  push:
    branches: [ android ]
  pull_request:
    branches: [ android, main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK (validates compilation)
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/crumina-release.jks"

      - name: Build signed release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/crumina-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Remove keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/crumina-release.jks"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crumina-apk
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
